name: Actionlint

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"

jobs:
  actionlint:
    name: Actionlint (workflow lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run actionlint
        uses: rhysd/actionlint@a443f344ff32813837fa49f7aa6cbc478d770e62 # v1.7.9
